services:
  app:
    build: .
    container_name: openreport
    restart: unless-stopped
    # No host port mapping — the app is reachable only through nginx (internal
    # docker network → http://app:3001). Access prod via nginx on :80/:443.
    environment:
      - NODE_ENV=production
      - PORT=3001
      - "SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET required (generate: openssl rand -hex 32)}"
      - "INTERNAL_TOKEN_SECRET=${INTERNAL_TOKEN_SECRET:?INTERNAL_TOKEN_SECRET required (openssl rand -hex 32; must differ from SESSION_SECRET)}"
      - "DATASOURCE_ENC_KEY=${DATASOURCE_ENC_KEY:?DATASOURCE_ENC_KEY required (openssl rand -hex 32; keep it stable / backed up)}"
    volumes:
      - app-data:/app/server/data
    networks:
      - openreport-net

  nginx:
    image: nginx:alpine
    container_name: openreport-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - app
    networks:
      - openreport-net

  certbot:
    image: certbot/certbot
    container_name: openreport-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - nginx
    # Run manually: docker compose run certbot certonly --webroot -w /var/lib/letsencrypt -d yourdomain.com

volumes:
  app-data:
  certbot-etc:
  certbot-var:

networks:
  openreport-net:
